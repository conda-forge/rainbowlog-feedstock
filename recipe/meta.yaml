{% set name = "rainbowlog" %}
{% set version = "2.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/rainbowlog-{{ version }}.tar.gz
  sha256: cb18b5da986b648cea72fd783b4ac5ca9a45627d4a3c8b7fa6fddb5d55bc328d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python >=3.7
    - poetry-core >=1.0.0
  run:
    - constyle >=1.0.2
    - importlib-metadata >=4.11
    - python >=3.7

test:
  imports:
    - rainbowlog
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/abrahammurciano/rainbowlog
  summary: Format your python logs with colours based on the log levels.
  license: MIT
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - abrahammurciano
